apiVersion: v1
kind: Service
metadata:
  name: ${APP_NAME}-service
  labels:
    app: ${APP_NAME}
spec:
  type: ClusterIP
  selector:
    app: ${APP_NAME}
  ports:
    - protocol: TCP
      # Service exposes port 80 inside the cluster (the conventional choice
      # for ingress backends) and forwards to the app's actual 3211 (see
      # server.port in application.yml). This lets the ingress reference
      # `port: 80` like the UI service does, so both services have the
      # same shape from Traefik's point of view.
      port: 80
      targetPort: 3211
