# nginx location snippet for the Authentication service.
#
# Dropped into /etc/nginx/snippets/${KUBE_NAMESPACE}/ on the VPS by
# ci/deploy-remote.sh and pulled in by the parent server block via:
#
#   server {
#     listen 80;
#     server_name <cluster>.cntrlflix.com;
#     include /etc/nginx/snippets/<cluster>/*.location.conf;
#     location / { ...UI proxy... }   # catch-all for the UI
#   }
#
# `/authentication/` wins over the UI's `/` because nginx picks the most
# specific prefix — so requests to /authentication/login, /authentication/
# oauth2/code/google, etc. all land here and everything else falls through
# to the UI's catch-all.
#
# ${LXD_BRIDGE_IP} is substituted at deploy time by ci/deploy.sh — it's the
# IP of the cluster's LXD container on lxdbr0, where Traefik listens on :80.
# Traefik then forwards into the Authentication pod whose Ingress claims
# the /authentication path.
location /authentication/ {
    proxy_pass         http://${LXD_BRIDGE_IP}:80;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # OAuth2 callbacks and password-reset flows can take a bit while the
    # provider responds, so give them a generous but bounded window.
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}
